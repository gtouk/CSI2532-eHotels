services:
  postgres:
    image: postgres:16
    container_name: ehotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ehotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ehotel-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ehotel
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    develop:
      watch:
        - action: rebuild
          path: ./backend/src

volumes:
  postgres_data: