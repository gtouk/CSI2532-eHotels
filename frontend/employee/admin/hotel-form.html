<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Hôtel — e-Hotels</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/client.css">
  <link rel="stylesheet" href="../../css/employee.css">
</head>
<body data-page="employee-admin-hotel-form">

  <div id="navbar"></div>

  <main>
    <div class="container">
      <div class="employee-layout">
        <aside class="sidebar">
          <h4>Portail employé</h4>
          <ul>
            <li><a href="../dashboard.html">Tableau de bord</a></li>
            <li><a href="../reservations.html">Réservations</a></li>
            <li><a href="../rentals.html">Locations</a></li>
            <li><a href="../customers.html">Clients</a></li>
            <li><a href="../rooms.html">Chambres</a></li>
          </ul>
          <div class="admin-block">
            <h4>Administration</h4>
            <ul>
              <li><a href="hotels.html" class="active">Hôtels</a></li>
              <li><a href="rooms.html">Chambres (admin)</a></li>
              <li><a href="employees.html">Employés</a></li>
              <li><a href="reports.html">Rapports</a></li>
            </ul>
          </div>
        </aside>
        <section>
          <div class="breadcrumb"><a href="hotels.html">Hôtels</a> / Formulaire</div>
          <h1 id="form-title">Nouvel hôtel</h1>

          <div class="card" style="margin-top:16px">
            <div id="alert-box"></div>
            <form id="hotel-form" style="margin-top:12px">
              <label for="chainId">Chaîne</label>
              <select id="chainId" name="chainId" required></select>

              <label for="name">Nom</label>
              <input type="text" id="name" name="name" required>

              <label for="category">Catégorie (étoiles 1–5)</label>
              <input type="number" id="category" name="category" min="1" max="5" required>

              <label for="address">Adresse (rue)</label>
              <input type="text" id="address" name="address" required>

              <div class="form-row">
                <div>
                  <label for="city">Ville</label>
                  <input type="text" id="city" name="city" required>
                </div>
                <div>
                  <label for="province">Province</label>
                  <input type="text" id="province" name="province">
                </div>
              </div>

              <div class="form-row">
                <div>
                  <label for="country">Pays</label>
                  <input type="text" id="country" name="country" value="Canada">
                </div>
                <div>
                  <label for="postalCode">Code postal</label>
                  <input type="text" id="postalCode" name="postalCode" required>
                </div>
              </div>

              <button type="submit" class="btn btn-primary">Enregistrer</button>
              <a href="hotels.html" class="btn btn-outline" style="margin-left:8px">Annuler</a>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer>
    <p>e-Hotels — Projet CSI2532 — Université d'Ottawa</p>
  </footer>

  <script src="../../js/main.js"></script>
  <script src="../../js/employee.js"></script>
</body>
</html>
