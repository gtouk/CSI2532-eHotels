<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Chambre — e-Hotels</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/client.css">
  <link rel="stylesheet" href="../../css/employee.css">
</head>
<body data-page="employee-admin-room-form">

  <div id="navbar"></div>

  <main>
    <div class="container">
      <div class="employee-layout">
        <aside class="sidebar">
          <h4>Portail employé</h4>
          <ul>
            <li><a href="../dashboard.html">Tableau de bord</a></li>
            <li><a href="../reservations.html">Réservations</a></li>
            <li><a href="../rentals.html">Locations</a></li>
            <li><a href="../customers.html">Clients</a></li>
            <li><a href="../rooms.html">Chambres</a></li>
          </ul>
          <div class="admin-block">
            <h4>Administration</h4>
            <ul>
              <li><a href="hotels.html">Hôtels</a></li>
              <li><a href="rooms.html" class="active">Chambres (admin)</a></li>
              <li><a href="employees.html">Employés</a></li>
              <li><a href="reports.html">Rapports</a></li>
            </ul>
          </div>
        </aside>
        <section>
          <div class="breadcrumb"><a href="rooms.html">Chambres</a> / Formulaire</div>
          <h1 id="form-title">Nouvelle chambre</h1>

          <div class="card" style="margin-top:16px">
            <div id="alert-box"></div>
            <form id="room-form" style="margin-top:12px">
              <label for="hotelId">Hôtel</label>
              <select id="hotelId" name="hotelId" required></select>

              <label for="roomNumber">Numéro de chambre</label>
              <input type="text" id="roomNumber" name="roomNumber" required>

              <label for="capacity">Capacité</label>
              <select id="capacity" name="capacity" required>
                <option value="single">Simple</option>
                <option value="double">Double</option>
                <option value="triple">Triple</option>
                <option value="suite">Suite</option>
                <option value="family">Familiale</option>
              </select>

              <label>Commodités</label>
              <div class="checkbox-group">
                <label><input type="checkbox" name="amenities" value="TV"> TV</label>
                <label><input type="checkbox" name="amenities" value="WiFi"> WiFi</label>
                <label><input type="checkbox" name="amenities" value="Air Conditioning"> Climatisation</label>
                <label><input type="checkbox" name="amenities" value="Mini Fridge"> Mini-frigo</label>
                <label><input type="checkbox" name="amenities" value="Balcony"> Balcon</label>
              </div>

              <label for="pricePerNight">Prix par nuit ($)</label>
              <input type="number" id="pricePerNight" name="pricePerNight" min="0" step="0.01" required>

              <label for="viewType">Vue</label>
              <select id="viewType" name="viewType">
                <option value="NONE">Aucune</option>
                <option value="SEA">Mer</option>
                <option value="MOUNTAIN">Montagne</option>
                <option value="CITY">Ville</option>
              </select>

              <label style="display:flex;align-items:center;gap:8px;margin-top:8px">
                <input type="checkbox" id="extendable" name="extendable"> Extensible
              </label>

              <label for="status">Statut</label>
              <select id="status" name="status">
                <option value="AVAILABLE">AVAILABLE</option>
                <option value="RESERVED">RESERVED</option>
                <option value="OCCUPIED">OCCUPIED</option>
                <option value="MAINTENANCE">MAINTENANCE</option>
              </select>

              <button type="submit" class="btn btn-primary">Enregistrer</button>
              <a href="rooms.html" class="btn btn-outline" style="margin-left:8px">Annuler</a>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer>
    <p>e-Hotels — Projet CSI2532 — Université d'Ottawa</p>
  </footer>

  <script src="../../js/main.js"></script>
  <script src="../../js/employee.js"></script>
</body>
</html>
