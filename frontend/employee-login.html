<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion employé — e-Hotels</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/client.css">
</head>
<body data-page="employee-login">

  <div id="navbar"></div>

  <main>
    <div class="auth-box">
      <h1>Portail employé</h1>
      <span class="subtitle">Connexion réservée au personnel</span>

      <div id="alert-box"></div>

      <form id="employee-login-form">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" placeholder="employe@hotel.com" required>

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Mot de passe" required>

        <button type="submit" class="btn btn-primary" style="width:100%">Se connecter</button>
      </form>

      <div class="auth-footer">
        <a href="index.html">Retour au site public</a>
      </div>
    </div>
  </main>

  <footer>
    <p>e-Hotels — Projet CSI2532 — Université d'Ottawa</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/employee.js"></script>
</body>
</html>
