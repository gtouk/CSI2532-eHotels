<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — e-Hotels</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/client.css">
</head>
<body data-page="client-register">

  <div id="navbar"></div>

  <main>
    <div class="auth-box">
      <h1>Inscription</h1>
      <span class="subtitle">Créez votre compte client</span>

      <div id="alert-box"></div>

      <form id="register-form">
        <div class="form-row">
          <div>
            <label for="firstName">Prénom</label>
            <input type="text" id="firstName" name="firstName" placeholder="Jean" required>
          </div>
          <div>
            <label for="lastName">Nom</label>
            <input type="text" id="lastName" name="lastName" placeholder="Dupont" required>
          </div>
        </div>

        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" placeholder="votre@email.com" required>

        <label for="phone">Téléphone</label>
        <input type="tel" id="phone" name="phone" placeholder="613-555-0000">

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Minimum 6 caractères" required minlength="6">

        <label for="address">Adresse</label>
        <input type="text" id="address" name="address" placeholder="123 rue Principale, Ottawa, ON">

        <button type="submit" class="btn btn-primary" style="width:100%">S'inscrire</button>
      </form>

      <div class="auth-footer">
        Déjà inscrit ? <a href="client-login.html">Connectez-vous</a>
      </div>
    </div>
  </main>

  <footer>
    <p>e-Hotels — Projet CSI2532 — Université d'Ottawa</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/client.js"></script>
</body>
</html>
