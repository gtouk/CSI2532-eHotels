<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche de chambres — e-Hotels</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/client.css">
</head>
<body data-page="room-search">

  <div id="navbar"></div>

  <main>
    <div class="container">
      <h1>Rechercher une chambre</h1>
      <p style="color:#777;margin-bottom:16px">Utilisez les filtres ci-dessous pour trouver la chambre idéale.</p>

      <div class="filter-box filter-box--search">
        <form id="search-form" class="search-filters">
          <div class="filter-row filter-row-5">
            <div class="filter-field">
              <label for="filter-startDate">Arrivée</label>
              <input type="date" id="filter-startDate" name="startDate">
            </div>
            <div class="filter-field">
              <label for="filter-endDate">Départ</label>
              <input type="date" id="filter-endDate" name="endDate">
            </div>
            <div class="filter-field">
              <label for="filter-capacity">Capacité</label>
              <select id="filter-capacity" name="capacity">
                <option value="">Toutes</option>
                <option value="single">Simple</option>
                <option value="double">Double</option>
                <option value="triple">Triple</option>
                <option value="suite">Suite</option>
                <option value="family">Familiale</option>
              </select>
            </div>
            <div class="filter-field">
              <label for="filter-chain">Chaîne</label>
              <select id="filter-chain" name="chainId">
                <option value="">Toutes</option>
              </select>
            </div>
            <div class="filter-field">
              <label for="filter-category">Catégorie</label>
              <select id="filter-category" name="category">
                <option value="">Toutes</option>
                <option value="1">1 étoile</option>
                <option value="2">2 étoiles</option>
                <option value="3">3 étoiles</option>
                <option value="4">4 étoiles</option>
                <option value="5">5 étoiles</option>
              </select>
            </div>
          </div>

          <div class="filter-row filter-row-5">
            <div class="filter-field">
              <label for="filter-minSurface">Superficie min. (m²)</label>
              <input type="number" id="filter-minSurface" name="minSurface" placeholder="—" min="0" step="1">
            </div>
            <div class="filter-field">
              <label for="filter-minRoomCount">Nb. chambres (hôtel)</label>
              <input type="number" id="filter-minRoomCount" name="minRoomCount" placeholder="—" min="1" step="1">
            </div>
            <div class="filter-field">
              <label for="filter-maxPrice">Prix max ($)</label>
              <input type="number" id="filter-maxPrice" name="maxPrice" placeholder="1000" min="0">
            </div>
            <div class="filter-field filter-field--empty" aria-hidden="true">
              <label class="filter-field-label-spacer">&nbsp;</label>
              <div class="filter-field-placeholder"></div>
            </div>
            <div class="filter-field filter-field--action">
              <label class="filter-field-label-spacer" for="search-submit">&nbsp;</label>
              <button type="submit" id="search-submit" class="btn btn-primary btn-block">Rechercher</button>
            </div>
          </div>
        </form>
      </div>

      <div id="search-results">
        <p style="text-align:center;color:#999;padding:30px">
          Remplissez les filtres et cliquez sur « Rechercher ».
        </p>
      </div>
    </div>
  </main>

  <footer>
    <p>e-Hotels — Projet CSI2532 — Université d'Ottawa</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/client.js"></script>
</body>
</html>
